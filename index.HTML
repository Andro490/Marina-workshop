.button {

  width: 50px;
  height: 50px;
  border-radius: 50%;
  background-color: rgb(20, 20, 20);
  border: none;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.164);
  cursor: pointer;
  transition-duration: .3s;
  overflow: hidden;
  position: relative;
}

.svgIcon {
  width: 12px;
  transition-duration: .3s;
}

.svgIcon path {
  fill: white;
}

.button:hover {
  width: 140px;
  border-radius: 50px;
  transition-duration: .3s;
  background-color: rgb(255, 69, 69);
  align-items: center;
}

.button:hover .svgIcon {
  width: 50px;
  transition-duration: .3s;
  transform: translateY(60%);
}

.button::before {
  position: absolute;
  top: -20px;
  content: "Delete";
  color: white;
  transition-duration: .3s;
  font-size: 2px;
}

.button:hover::before {
  font-size: 13px;
  opacity: 1;
  transform: translateY(30px);
  transition-duration: .3s;
}

/* From Uiverse.io by Smit-Prajapati */ 
.input-container {
    width: 500px;
  display: flex;
  background: white;
  border-radius: 1rem;
  background: linear-gradient(135deg, #23272F 0%, #14161a 100%);
  box-shadow: 10px 10px 20px #0e1013, -10px -10px 40px #383e4b;
  padding: 0.3rem;
  gap: 0.3rem;
  align-items: center;
}

.input-container input {
  border-radius: 0.8rem 0 0 0.8rem;
  background: #23272F;
  box-shadow: inset 5px 5px 10px #0e1013, inset -5px -5px 10px #383e4b, 0px 0px 100px rgba(255, 212, 59, 0), 0px 0px 100px rgba(255, 102, 0, 0);
  width: 88%;
  flex-basis: 75%;
  padding: 1rem;
  border: none;
  border: 1px solid transparent;
  color: white;
  transition: all 0.2s ease-in-out;
}

.input-container input:focus {
  border: 1px solid #FFD43B;
  outline: none;
  box-shadow: inset 0px 0px 10px rgba(255, 102, 0, 0.5), inset 0px 0px 10px rgba(255, 212, 59, 0.5), 0px 0px 100px rgba(255, 212, 59, 0.5), 0px 0px 100px rgba(255, 102, 0, 0.5);
}

.input-container button {
  flex-basis: 25%;
  padding: 1rem;
  background: linear-gradient(135deg, rgb(255, 212, 59) 0%, rgb(255, 102, 0) 100%);
  box-shadow: 0px 0px 1px rgba(255, 212, 59, 0.5), 0px 0px 1px rgba(255, 102, 0, 0.5);
  font-weight: 900;
  letter-spacing: 0.3rem;
  text-transform: uppercase;
  color: #23272F;
  border: none;
  width: 100%;
  border-radius: 0 1rem 1rem 0;
  transition: all 0.2s ease-in-out;
}

.input-container button:hover {
  background: linear-gradient(135deg, rgb(255, 212, 59) 50%, rgb(255, 102, 0) 100%);
  box-shadow: 0px 0px 100px rgba(255, 212, 59, 0.5), 0px 0px 100px rgba(255, 102, 0, 0.5);
}

<script>

    function removeWatermark() {

        el.remove();
      });
    }

    <script>
      let stock = {};
      let inTransactions = [];
      let outTransactions = [];
      let totalIn = 0;
      let totalOut = 0;

      // تحميل البيانات المحفوظة عند تحميل الصفحة
      window.onload = function () {
        const savedStock = localStorage.getItem("stockData");

        if (savedStock) {
          let parsedStock = JSON.parse(savedStock);
          // ترقية البيانات القديمة في حال كانت مخزنة كأرقام فقط
          for (let key in parsedStock) {
            if (typeof parsedStock[key] === 'number') {
              parsedStock[key] = { amount: parsedStock[key], count: 0 };
            }
          }
          stock = parsedStock;
        }

        // const savedIn = localStorage.getItem("inTransactions");
        // if (savedIn) inTransactions = JSON.parse(savedIn);

        // const savedOut = localStorage.getItem("outTransactions");
        // if (savedOut) outTransactions = JSON.parse(savedOut);

        // const sTotalIn = localStorage.getItem("totalIn");
        // if (sTotalIn) totalIn = parseFloat(sTotalIn);

        // const sTotalOut = localStorage.getItem("totalOut");
        // if (sTotalOut) totalOut = parseFloat(sTotalOut);

        updateTables();
      };

      // تحديث جميع الجداول
      function updateTables() {
        updateStockTable();
        updateShortagesTable();
        updateInTable();
        updateOutTable();
        document.getElementById("total-in").textContent = totalIn;
        document.getElementById("total-out").textContent = totalOut;
      }

      // تحديث جدول المخزون
      function updateStockTable() {
        const tableBody = document.getElementById("stock-table-body");
        tableBody.innerHTML = "";

        let alertMessage = "";

        for (let description in stock) {
          const row = document.createElement("tr");
          const descCell = document.createElement("td");
          const qtyCell = document.createElement("td");
          const countCell = document.createElement("td");

          descCell.textContent = description;
          qtyCell.textContent = stock[description].amount;
          countCell.textContent = stock[description].count;

          row.appendChild(descCell);
          row.appendChild(qtyCell);
          row.appendChild(countCell);
          tableBody.appendChild(row);

        }
        
        const alertDiv = document.getElementById("alert");
        alertDiv.innerHTML = "";
        saveToLocalStorage();
      }

      // تحديث جدول النواقص
      function updateShortagesTable() {
        const tableBody = document.getElementById("shortages-table-body");
        const section = document.getElementById("shortages-section");
        tableBody.innerHTML = "";

        let hasShortages = false;

        for (let description in stock) {
          if (stock[description].amount < 20 || stock[description].count < 20) {
            hasShortages = true;
            const row = document.createElement("tr");
            const descCell = document.createElement("td");
            const qtyCell = document.createElement("td");
            const countCell = document.createElement("td");

            descCell.textContent = description;
            qtyCell.textContent = stock[description].amount;
            countCell.textContent = stock[description].count;

            if (stock[description].amount < 20) {
              qtyCell.style.color = "red";
              qtyCell.style.fontWeight = "bold";
            }
            if (stock[description].count < 20) {
              countCell.style.color = "red";
              countCell.style.fontWeight = "bold";
            }

            row.appendChild(descCell);
            row.appendChild(qtyCell);
            row.appendChild(countCell);
            tableBody.appendChild(row);
          }
        }

        if (hasShortages) {
          section.style.display = "block";
        } else {
          section.style.display = "none";
        }
      }

      // تحديث جدول الداخل
      function updateInTable() {
        const tableBody = document.getElementById("in-table-body");
        tableBody.innerHTML = "";

        inTransactions.forEach((transaction) => {
          const row = document.createElement("tr");
          const descCell = document.createElement("td");
          const amountCell = document.createElement("td");
          const countCell = document.createElement("td");

          descCell.textContent = transaction.description;
          amountCell.textContent = transaction.amount;
          countCell.textContent = transaction.count;

          row.appendChild(descCell);
          row.appendChild(amountCell);
          row.appendChild(countCell);
          tableBody.appendChild(row);
        });
      }

      // تحديث جدول الخارج
      function updateOutTable() {
        const tableBody = document.getElementById("out-table-body");
        tableBody.innerHTML = "";

        outTransactions.forEach((transaction) => {
          const row = document.createElement("tr");
          const descCell = document.createElement("td");
          const amountCell = document.createElement("td");
          const countCell = document.createElement("td");

          descCell.textContent = transaction.description;
          amountCell.textContent = transaction.amount;
          countCell.textContent = transaction.count;

          row.appendChild(descCell);
          row.appendChild(amountCell);
          row.appendChild(countCell);
          tableBody.appendChild(row);
        });
      }

      // إضافة إلى الداخل
      function addIn() {
        const description = document.getElementById("in-description").value.trim();
        const amount = parseFloat(document.getElementById("in-amount").value);
        const count = parseFloat(document.getElementById("in-count").value);

        if (!description || isNaN(amount) || amount <= 0 || isNaN(count) || count <= 0) {
          alert("يرجى إدخال بيانات صحيحة (من فضلك أضف النوع، الوزن والعدد).");
          return;
        }

        // تحديث المخزون
        if (stock[description]) {
          stock[description].amount += amount;
          stock[description].count += count;
        } else {
          stock[description] = { amount: amount, count: count };
        }

        // إضافة إلى جدول الداخل
        inTransactions.push({ description, amount, count });
        totalIn += amount;

        updateTables();

        document.getElementById("in-description").value = "";
        document.getElementById("in-amount").value = "";
        document.getElementById("in-count").value = "";
      }

      // إضافة إلى الخارج
      function addOut() {
        const description = document.getElementById("out-description").value.trim();
        const amount = parseFloat(document.getElementById("out-amount").value);
        const count = parseFloat(document.getElementById("out-count").value);

        if (!description || isNaN(amount) || amount <= 0 || isNaN(count) || count <= 0) {
          alert("يرجى إدخال بيانات صحيحة (من فضلك أضف النوع، الوزن والعدد).");
          return;
        }

        if (stock[description] && stock[description].amount >= amount && stock[description].count >= count) {
          stock[description].amount -= amount;
          stock[description].count -= count;
          outTransactions.push({ description, amount, count });
          totalOut += amount;

          updateTables();
        } else {
          alert("الكمية غير متوفرة في المخزون (الوزن أو العدد المتاح أقل من المطلوب).");
        }

        document.getElementById("out-description").value = "";
        document.getElementById("out-amount").value = "";
        document.getElementById("out-count").value = "";
      }

      // حفظ البيانات في Local Storage
      function saveToLocalStorage() {
        localStorage.setItem("stockData", JSON.stringify(stock));
        localStorage.setItem("inTransactions", JSON.stringify(inTransactions));
        localStorage.setItem("outTransactions", JSON.stringify(outTransactions));
        localStorage.setItem("totalIn", totalIn);
        localStorage.setItem("totalOut", totalOut);
      }
      
      function clearAlert() {
        const alertDiv = document.getElementById("alert");
        alertDiv.innerHTML = ""; // مسح الرسالة
      }
      
      // دالة مسح بيانات المخزون
      function clearStock() {
        if (confirm("هل أنت متأكد من أنك تريد مسح جميع بيانات المخزون والعمليات؟")) {
          stock = {}; // مسح بيانات المخزون
          inTransactions = []; // مسح تاريخ الوارد
          outTransactions = []; // مسح تاريخ الصادر
          totalIn = 0;
          totalOut = 0;
          saveToLocalStorage(); // تحديث Local Storage
          updateTables(); // تحديث الجداول لعرض الحالة الجديدة
          alert("تم مسح تصفير جميع البيانات بنجاح.");
        }
      }
    </script>
